# Word Teacher - Nginx Docker 配置
# 基于路径的路由: /teacher-test (学生端), /teacher-admin (管理后台)
# 支持 HTTPS (443) 和 HTTP (8080)

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset utf-8;
    charset_types application/json text/plain text/html text/css text/xml application/javascript;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript;

    # 上游服务
    upstream backend {
        server backend:3001;
        keepalive 32;
    }

    upstream agent {
        server agent:3002;
        keepalive 16;
    }

    upstream minio {
        server minio:9000;
        keepalive 16;
    }

    # ============ HTTP 8080 - 重定向到 HTTPS ============
    server {
        listen 8080;
        server_name workly.cloud www.workly.cloud;

        # Let's Encrypt 验证路径
        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
        }

        # 重定向到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============ HTTPS 443 - 主服务器 ============
    server {
        listen 443 ssl;
        http2 on;
        server_name workly.cloud www.workly.cloud;

        # SSL 证书配置
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL 安全配置 - 兼容更多客户端
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # 防止连接重置的关键配置
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # 健康检查
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # 根路径 - 个人博客首页
        location = / {
            root /usr/share/nginx/html/homepage;
            index index.html;
        }

        # ============ MinIO 静态资源 /minio ============
        # 代理 MinIO 存储桶的公开访问
        location /minio/ {
            rewrite ^/minio/(.*)$ /$1 break;
            proxy_pass http://minio;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 缓存静态资源
            proxy_cache_valid 200 30d;
            add_header Cache-Control "public, max-age=2592000";

            # CORS 支持
            add_header Access-Control-Allow-Origin *;
        }

        # ============ 学生端 /teacher-test ============
        # 不带斜杠重定向到带斜杠
        location = /teacher-test {
            return 301 $scheme://$host/teacher-test/;
        }

        # 所有 API 请求都转发到 Backend
        # Backend 负责 JWT 认证，然后根据需要调用 Agent 服务
        # Agent 服务（dialogue AI, read-aloud evaluate 等）由 Backend 内部调用

        # SSE 流式接口（对话、评分等）- 需要特殊配置防止连接重置
        location ~ ^/teacher-test/api/dialogue/workflow/stream {
            rewrite ^/teacher-test/api/(.*)$ /api/$1 break;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # SSE 关键配置 - 禁用缓冲，实时传输
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;

            # 更长的超时时间用于流式响应
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # 普通 API 请求
        location /teacher-test/api/ {
            rewrite ^/teacher-test/api/(.*)$ /api/$1 break;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        location /teacher-test/ {
            alias /usr/share/nginx/html/frontend/;
            index index.html;
            try_files $uri $uri/ /teacher-test/index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ============ 管理后台 /teacher-admin ============
        # 不带斜杠重定向到带斜杠
        location = /teacher-admin {
            return 301 $scheme://$host/teacher-admin/;
        }

        # Backend 服务路由
        location /teacher-admin/api/ {
            rewrite ^/teacher-admin/api/(.*)$ /api/$1 break;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        location /teacher-admin/ {
            alias /usr/share/nginx/html/admin/;
            index index.html;
            try_files $uri $uri/ /teacher-admin/index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # 其他路径 - 尝试首页静态文件，否则 404
        location / {
            root /usr/share/nginx/html/homepage;
            try_files $uri $uri/ =404;
        }
    }

    # ============ HTTP 8080 - 本地/IP直接访问 (无SSL) ============
    server {
        listen 8080 default_server;
        server_name _;

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location = / {
            root /usr/share/nginx/html/homepage;
            index index.html;
        }

        # ============ MinIO 静态资源 /minio (HTTP 8080) ============
        # 重要：Cloudflare Tunnel 使用 8080 端口，必须有这个代理
        location /minio/ {
            rewrite ^/minio/(.*)$ /$1 break;
            proxy_pass http://minio;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 缓存静态资源
            proxy_cache_valid 200 30d;
            add_header Cache-Control "public, max-age=2592000";

            # CORS 支持
            add_header Access-Control-Allow-Origin *;
        }

        # 重定向无斜杠路径到有斜杠路径
        location = /teacher-test {
            return 301 $scheme://$host/teacher-test/;
        }

        location = /teacher-admin {
            return 301 $scheme://$host/teacher-admin/;
        }

        # SSE 流式接口
        location ~ ^/teacher-test/api/dialogue/workflow/stream {
            rewrite ^/teacher-test/api/(.*)$ /api/$1 break;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        location /teacher-test/api/ {
            rewrite ^/teacher-test/api/(.*)$ /api/$1 break;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        location /teacher-test/ {
            alias /usr/share/nginx/html/frontend/;
            index index.html;
            try_files $uri $uri/ /teacher-test/index.html;
        }

        location /teacher-admin/api/ {
            rewrite ^/teacher-admin/api/(.*)$ /api/$1 break;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        location /teacher-admin/ {
            alias /usr/share/nginx/html/admin/;
            index index.html;
            try_files $uri $uri/ /teacher-admin/index.html;
        }

        location / {
            root /usr/share/nginx/html/homepage;
            try_files $uri $uri/ =404;
        }
    }
}

