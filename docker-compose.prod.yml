# Word Teacher - 生产部署配置（使用预构建镜像）
# 在 CVM 上使用此文件，无需构建镜像
# 
# 使用方法:
#   1. 复制此文件和 .env 到服务器
#   2. 配置 .env 中的环境变量
#   3. docker compose -f docker-compose.prod.yml up -d

services:
  # ============ MySQL 数据库 ============
  mysql:
    image: mysql:8.0
    container_name: word-teacher-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: word_teacher
      MYSQL_USER: wordteacher
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql-optimize.cnf:/etc/mysql/conf.d/optimize.cnf:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - word-teacher-network

  # ============ Backend API 服务 ============
  backend:
    image: ${DOCKER_USERNAME:-your-dockerhub-username}/word-teacher-backend:${IMAGE_TAG:-latest}
    container_name: word-teacher-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./logs/backend:/app/logs
      - ./data/lancedb:/app/data/lancedb
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://wordteacher:${MYSQL_PASSWORD}@mysql:3306/word_teacher
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      AGENT_URL: http://agent:3002/api/agent
      AGENT_API_KEY: ${AGENT_API_KEY}
      LANCEDB_PATH: /app/data/lancedb
      # MinIO 配置 - 使用相对路径，不依赖域名
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123456}
      MINIO_BUCKET: ${MINIO_BUCKET:-covers}
      MINIO_PUBLIC_PATH: ${MINIO_PUBLIC_PATH:-/minio}
      # AI/Embedding 配置
      AI_API_KEY: ${DASHSCOPE_API_KEY}
      AI_API_URL: ${AI_API_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      # 钉钉通知（可选）
      DINGTALK_ACCESS_TOKEN: ${DINGTALK_ACCESS_TOKEN:-}
      DINGTALK_SECRET: ${DINGTALK_SECRET:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - word-teacher-network

  # ============ AI Agent 服务 ============
  agent:
    image: ${DOCKER_USERNAME:-your-dockerhub-username}/word-teacher-agent:${IMAGE_TAG:-latest}
    container_name: word-teacher-agent
    restart: always
    volumes:
      - ./logs/agent:/app/logs
    environment:
      NODE_ENV: production
      PORT: 3002
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      # LangChain ChatOpenAI 需要这个环境变量
      OPENAI_API_KEY: ${DASHSCOPE_API_KEY}
      AGENT_API_KEY: ${AGENT_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      # 阿里云智能语音交互 - 一句话识别 (STT)
      ALIYUN_STT_APPKEY: ${ALIYUN_STT_APPKEY:-}
      ALIYUN_STT_TOKEN: ${ALIYUN_STT_TOKEN:-}
      ALIYUN_AK_ID: ${ALIYUN_AK_ID:-}
      ALIYUN_AK_SECRET: ${ALIYUN_AK_SECRET:-}
      # 科大讯飞语音评测 (ISE)
      XFYUN_APP_ID: ${XFYUN_APP_ID:-}
      XFYUN_API_KEY: ${XFYUN_API_KEY:-}
      XFYUN_API_SECRET: ${XFYUN_API_SECRET:-}
      XFYUN_ISE_ACCOUNTS: ${XFYUN_ISE_ACCOUNTS:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3002/api/agent/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - word-teacher-network

  # ============ MinIO 对象存储 ============
  minio:
    # 注意：不要降级 MinIO 版本，新版本写入的元数据旧版本无法读取
    image: minio/minio:latest
    container_name: word-teacher-minio
    restart: always
    ports:
      - "9000:9000"    # API 端口
      - "9001:9001"    # 控制台端口
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123456}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - word-teacher-network

  # ============ MySQL 自动备份 ============
  mysql-backup:
    image: mysql:8.0
    container_name: word-teacher-mysql-backup
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - ./backups:/backups
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "MySQL backup service started"
        while true; do
          # 计算距离下次凌晨3点的秒数
          now=$$(date +%s)
          target=$$(date -d "today 03:00" +%s 2>/dev/null || date -d "03:00" +%s 2>/dev/null)
          if [ "$$now" -ge "$$target" ]; then
            target=$$(( $$target + 86400 ))
          fi
          wait_seconds=$$(( $$target - $$now ))
          next_run=$$(date -d "@$$target" "+%Y-%m-%d %H:%M:%S" 2>/dev/null || echo "tomorrow 03:00")
          echo "[backup] Next backup at $$next_run (in $${wait_seconds}s)"
          sleep $$wait_seconds

          # 执行备份
          TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="/backups/word_teacher_$$TIMESTAMP.sql.gz"
          echo "[backup] Starting backup: $$BACKUP_FILE"
          if mysqldump -h mysql -u wordteacher -p"$$MYSQL_PASSWORD" --single-transaction --quick word_teacher | gzip > "$$BACKUP_FILE"; then
            SIZE=$$(du -h "$$BACKUP_FILE" | cut -f1)
            echo "[backup] ✅ Backup completed: $$BACKUP_FILE ($$SIZE)"
          else
            echo "[backup] ❌ Backup failed!"
            rm -f "$$BACKUP_FILE"
          fi

          # 清理7天前的备份
          deleted=$$(find /backups -name "word_teacher_*.sql.gz" -mtime +7 -delete -print | wc -l)
          if [ "$$deleted" -gt 0 ]; then
            echo "[backup] 🧹 Cleaned $$deleted old backup(s)"
          fi
        done
    networks:
      - word-teacher-network

  # ============ LanceDB 自动备份 ============
  lancedb-backup:
    image: alpine:3.19
    container_name: word-teacher-lancedb-backup
    restart: always
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./data/lancedb:/data/lancedb:ro
      - ./backups:/backups
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "LanceDB backup service started"
        while true; do
          # 计算距离下次凌晨3:30的秒数（比 MySQL 备份晚30分钟）
          now=$$(date +%s)
          today_target=$$(date -d "03:30" +%s 2>/dev/null || date +%s)
          if [ "$$now" -ge "$$today_target" ]; then
            target=$$(( $$today_target + 86400 ))
          else
            target=$$today_target
          fi
          wait_seconds=$$(( $$target - $$now ))
          echo "[lancedb-backup] Next backup in $${wait_seconds}s"
          sleep $$wait_seconds

          # 执行备份（tar 打包 lancedb 目录）
          TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="/backups/lancedb_$$TIMESTAMP.tar.gz"
          echo "[lancedb-backup] Starting backup: $$BACKUP_FILE"
          if tar -czf "$$BACKUP_FILE" -C /data lancedb 2>/dev/null; then
            SIZE=$$(du -h "$$BACKUP_FILE" | cut -f1)
            echo "[lancedb-backup] ✅ Backup completed: $$BACKUP_FILE ($$SIZE)"
          else
            echo "[lancedb-backup] ❌ Backup failed!"
            rm -f "$$BACKUP_FILE"
          fi

          # 清理7天前的备份
          deleted=$$(find /backups -name "lancedb_*.tar.gz" -mtime +7 -delete -print | wc -l)
          if [ "$$deleted" -gt 0 ]; then
            echo "[lancedb-backup] 🧹 Cleaned $$deleted old backup(s)"
          fi
        done

  # ============ Nginx 前端 + 反向代理 ============
  nginx:
    image: ${DOCKER_USERNAME:-your-dockerhub-username}/word-teacher-nginx:${IMAGE_TAG:-latest}
    container_name: word-teacher-nginx
    restart: always
    ports:
      - "80:8080"     # HTTP
      - "443:443"     # HTTPS
    depends_on:
      - backend
      - agent
      - minio
    volumes:
      - ./ssl:/etc/nginx/ssl:ro  # SSL 证书
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - word-teacher-network

# ============ 数据卷 ============
volumes:
  mysql_data:
    driver: local
  minio_data:
    driver: local

# ============ 网络 ============
networks:
  word-teacher-network:
    driver: bridge

