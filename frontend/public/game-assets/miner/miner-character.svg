<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- 身体 -->
  <rect x="38" y="88" width="44" height="32" rx="10" fill="#1565c0"/>
  <!-- 工装背带 -->
  <path d="M48 88 L44 105" stroke="#ffa000" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M72 88 L76 105" stroke="#ffa000" stroke-width="3.5" stroke-linecap="round"/>
  <rect x="42" y="103" width="36" height="5" rx="2.5" fill="#ffa000"/>
  <!-- 口袋 -->
  <rect x="49" y="108" width="10" height="8" rx="2" fill="#0d47a1" stroke="#1565c0" stroke-width="0.5"/>
  <rect x="63" y="108" width="10" height="8" rx="2" fill="#0d47a1" stroke="#1565c0" stroke-width="0.5"/>

  <!-- 左手臂 -->
  <rect x="24" y="90" width="16" height="22" rx="8" fill="#ffcc80"/>
  <!-- 左手套 -->
  <rect x="26" y="106" width="12" height="10" rx="5" fill="#795548"/>

  <!-- 右手臂 -->
  <rect x="80" y="90" width="16" height="22" rx="8" fill="#ffcc80"/>
  <!-- 右手套 -->
  <rect x="82" y="106" width="12" height="10" rx="5" fill="#795548"/>

  <!-- 靴子 -->
  <rect x="40" y="118" width="16" height="14" rx="5" fill="#4e342e"/>
  <rect x="64" y="118" width="16" height="14" rx="5" fill="#4e342e"/>
  <!-- 靴底 -->
  <rect x="38" y="128" width="20" height="6" rx="3" fill="#3e2723"/>
  <rect x="62" y="128" width="20" height="6" rx="3" fill="#3e2723"/>

  <!-- 脖子 -->
  <rect x="52" y="82" width="16" height="10" rx="4" fill="#ffcc80"/>

  <!-- 头（大头风格） -->
  <circle cx="60" cy="52" r="32" fill="#ffcc80"/>

  <!-- 安全帽 -->
  <ellipse cx="60" cy="30" rx="30" ry="18" fill="#fdd835"/>
  <ellipse cx="60" cy="25" rx="26" ry="14" fill="#ffeb3b"/>
  <!-- 帽檐 -->
  <path d="M26 32 Q60 42 94 32 Q94 38 60 44 Q26 38 26 32Z" fill="#f9a825"/>
  <!-- 帽灯底座 -->
  <rect x="53" y="14" width="14" height="10" rx="3" fill="#e0e0e0"/>
  <!-- 帽灯 -->
  <circle cx="60" cy="14" r="6" fill="#fff9c4"/>
  <circle cx="60" cy="14" r="4" fill="#fff176"/>
  <!-- 帽灯光芒 -->
  <line x1="60" y1="6" x2="60" y2="3" stroke="#fff176" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="54" y1="8" x2="52" y2="5" stroke="#fff176" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="66" y1="8" x2="68" y2="5" stroke="#fff176" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 眉毛 -->
  <path d="M42 42 Q47 39 52 42" stroke="#5d4037" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M68 42 Q73 39 78 42" stroke="#5d4037" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 眼睛（大而有神） -->
  <ellipse cx="48" cy="50" rx="7" ry="7.5" fill="#fff"/>
  <ellipse cx="72" cy="50" rx="7" ry="7.5" fill="#fff"/>
  <!-- 瞳孔 -->
  <circle cx="50" cy="50" r="4.5" fill="#333"/>
  <circle cx="74" cy="50" r="4.5" fill="#333"/>
  <!-- 眼睛高光 -->
  <circle cx="52" cy="48" r="2" fill="#fff"/>
  <circle cx="76" cy="48" r="2" fill="#fff"/>
  <circle cx="48" cy="52" r="1" fill="#fff"/>
  <circle cx="72" cy="52" r="1" fill="#fff"/>

  <!-- 鼻子 -->
  <ellipse cx="60" cy="58" rx="3" ry="2.5" fill="#f5b87a"/>

  <!-- 笑嘴 -->
  <path d="M50 64 Q60 72 70 64" stroke="#d84315" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- 嘴唇高光 -->
  <path d="M53 65 Q60 70 67 65" fill="#e57373" opacity="0.3"/>

  <!-- 腮红 -->
  <ellipse cx="40" cy="58" rx="5" ry="3.5" fill="#ff8a80" opacity="0.4"/>
  <ellipse cx="80" cy="58" rx="5" ry="3.5" fill="#ff8a80" opacity="0.4"/>
</svg>
