name: Deploy to Server

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      image_tag:
        description: '镜像 Tag（默认 latest，填 sha-xxxxxxx 可回滚到历史版本）'
        required: false
        default: 'latest'

env:
  # 修改为你的 Docker Hub 用户名
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME || 'your-dockerhub-username' }}
  IMAGE_PREFIX: ${{ vars.DOCKER_USERNAME || 'your-dockerhub-username' }}/word-teacher
  SHORT_SHA: sha-${{ github.sha }}
  DEPLOY_TAG: ${{ inputs.image_tag || 'latest' }}

jobs:
  # 检测哪些服务需要重新构建
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      agent: ${{ steps.changes.outputs.agent }}
      config: ${{ steps.changes.outputs.config }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          # 手动触发时强制全量构建
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger: force rebuild all"
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "agent=true" >> $GITHUB_OUTPUT
            echo "config=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 获取变更的文件
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "Changed files: $CHANGED"

          # 检测各服务是否有变更
          if echo "$CHANGED" | grep -qE "^backend/|^Dockerfile.backend|^prisma/"; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE "^frontend/|^admin/|^deploy/homepage/|^Dockerfile.nginx|^deploy/nginx"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE "^agent/|^Dockerfile.agent"; then
            echo "agent=true" >> $GITHUB_OUTPUT
          else
            echo "agent=false" >> $GITHUB_OUTPUT
          fi

          # 检测配置文件是否有变更（docker-compose, workflow, deploy配置等）
          if echo "$CHANGED" | grep -qE "^docker-compose.prod.yml|^\.github/workflows/|^deploy/"; then
            echo "config=true" >> $GITHUB_OUTPUT
          else
            echo "config=false" >> $GITHUB_OUTPUT
          fi

  # 构建并推送 Backend
  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.IMAGE_PREFIX }}-backend:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 构建并推送 Nginx (Frontend + Admin)
  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Nginx
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.nginx
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-nginx:latest
            ${{ env.IMAGE_PREFIX }}-nginx:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 构建并推送 Agent
  build-agent:
    needs: detect-changes
    if: needs.detect-changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Agent
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.agent
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-agent:latest
            ${{ env.IMAGE_PREFIX }}-agent:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 部署到服务器
  deploy:
    needs: [detect-changes, build-backend, build-frontend, build-agent]
    if: "!cancelled() && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success' || needs.build-agent.result == 'success' || needs.detect-changes.outputs.config == 'true')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # 同步部署所需配置文件到服务器（全新服务器兼容）
      - name: Sync deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml,deploy/"
          target: "/root/word-teacher/"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          ALIYUN_STT_APPKEY: ${{ secrets.ALIYUN_STT_APPKEY }}
          ALIYUN_AK_ID: ${{ secrets.ALIYUN_AK_ID }}
          ALIYUN_AK_SECRET: ${{ secrets.ALIYUN_AK_SECRET }}
          XFYUN_APP_ID: ${{ vars.XFYUN_APP_ID }}
          XFYUN_API_KEY: ${{ secrets.XFYUN_API_KEY }}
          XFYUN_API_SECRET: ${{ secrets.XFYUN_API_SECRET }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          DINGTALK_ACCESS_TOKEN: ${{ secrets.DINGTALK_ACCESS_TOKEN }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          SSL_FULLCHAIN: ${{ secrets.SSL_FULLCHAIN }}
          SSL_PRIVKEY: ${{ secrets.SSL_PRIVKEY }}
          # 直接传递构建结果，更可靠
          BUILD_BACKEND: ${{ needs.build-backend.result }}
          BUILD_FRONTEND: ${{ needs.build-frontend.result }}
          BUILD_AGENT: ${{ needs.build-agent.result }}
          DEPLOY_TAG: ${{ env.DEPLOY_TAG }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m
          envs: DOCKER_USERNAME,DASHSCOPE_API_KEY,ALIYUN_STT_APPKEY,ALIYUN_AK_ID,ALIYUN_AK_SECRET,XFYUN_APP_ID,XFYUN_API_KEY,XFYUN_API_SECRET,MYSQL_ROOT_PASSWORD,MYSQL_PASSWORD,JWT_SECRET,AGENT_API_KEY,MINIO_ROOT_PASSWORD,DINGTALK_ACCESS_TOKEN,DINGTALK_SECRET,SSL_FULLCHAIN,SSL_PRIVKEY,BUILD_BACKEND,BUILD_FRONTEND,BUILD_AGENT,DEPLOY_TAG
          script: |
            set -e

            echo "🚀 开始部署..."
            echo "BUILD_BACKEND=$BUILD_BACKEND"
            echo "BUILD_FRONTEND=$BUILD_FRONTEND"
            echo "BUILD_AGENT=$BUILD_AGENT"
            echo "DEPLOY_TAG=${DEPLOY_TAG:-latest}"

            # ============================================================
            # 0. 初始化项目目录（全新服务器兼容）
            # ============================================================
            mkdir -p /root/word-teacher
            cd /root/word-teacher

            # 确保日志目录、备份目录、SSL 目录存在
            mkdir -p logs/backend logs/agent backups ssl
            chown -R 1001:1001 logs/

            # ============================================================
            # 1. 从 GitHub Secrets 生成 .env 文件
            # ============================================================
            echo "🔑 生成 .env 配置文件..."

            escape_dollar() {
              printf '%s' "$1" | sed 's/\$/\$\$/g'
            }

            get_value() {
              if [ -z "$1" ]; then
                printf '%s' "$2"
              else
                printf '%s' "$1"
              fi
            }

            {
              printf 'IMAGE_TAG=%s\n' "${DEPLOY_TAG:-latest}"
              printf 'DOCKER_USERNAME=%s\n' "$(escape_dollar "$(get_value "$DOCKER_USERNAME" "your-dockerhub-username")")"
              printf 'MYSQL_ROOT_PASSWORD=%s\n' "$(escape_dollar "$(get_value "$MYSQL_ROOT_PASSWORD" "WordTeacher2024!")")"
              printf 'MYSQL_PASSWORD=%s\n' "$(escape_dollar "$(get_value "$MYSQL_PASSWORD" "change_this_app_password_456")")"
              printf 'JWT_SECRET=%s\n' "$(escape_dollar "$(get_value "$JWT_SECRET" "word-teacher-jwt-secret-key-2024-production")")"
              printf 'CORS_ORIGINS=*\n'
              printf 'AGENT_API_KEY=%s\n' "$(escape_dollar "$(get_value "$AGENT_API_KEY" "word-teacher-agent-api-key-2024")")"
              printf 'MINIO_ROOT_USER=admin\n'
              printf 'MINIO_ROOT_PASSWORD=%s\n' "$(escape_dollar "$(get_value "$MINIO_ROOT_PASSWORD" "minio123456")")"
              printf 'MINIO_BUCKET=covers\n'
              printf 'MINIO_PUBLIC_PATH=/minio\n'
              printf 'DASHSCOPE_API_KEY=%s\n' "$(escape_dollar "$DASHSCOPE_API_KEY")"
              printf 'ALIYUN_STT_APPKEY=%s\n' "$(escape_dollar "$ALIYUN_STT_APPKEY")"
              printf 'ALIYUN_AK_ID=%s\n' "$(escape_dollar "$ALIYUN_AK_ID")"
              printf 'ALIYUN_AK_SECRET=%s\n' "$(escape_dollar "$ALIYUN_AK_SECRET")"
              printf 'XFYUN_APP_ID=%s\n' "$(escape_dollar "$XFYUN_APP_ID")"
              printf 'XFYUN_API_KEY=%s\n' "$(escape_dollar "$XFYUN_API_KEY")"
              printf 'XFYUN_API_SECRET=%s\n' "$(escape_dollar "$XFYUN_API_SECRET")"
              printf 'DINGTALK_ACCESS_TOKEN=%s\n' "$(escape_dollar "$DINGTALK_ACCESS_TOKEN")"
              printf 'DINGTALK_SECRET=%s\n' "$(escape_dollar "$DINGTALK_SECRET")"
            } > .env

            echo "✅ .env 配置文件已生成"

            # ============================================================
            # 2. SSL 证书处理（优先使用 Let's Encrypt 有效证书）
            # ============================================================
            SSL_UPDATED=false

            # 优先检查 Let's Encrypt 是否有有效证书
            if [ -f /etc/letsencrypt/live/workly.cloud/fullchain.pem ]; then
              LE_EXPIRY=$(openssl x509 -in /etc/letsencrypt/live/workly.cloud/fullchain.pem -noout -enddate 2>/dev/null | cut -d= -f2)
              if [ -n "$LE_EXPIRY" ] && [ "$(date -d "$LE_EXPIRY" +%s 2>/dev/null || date -j -f "%b %d %H:%M:%S %Y %Z" "$LE_EXPIRY" +%s 2>/dev/null)" -gt "$(date +%s)" ]; then
                echo "🔐 使用 Let's Encrypt 有效证书（到期: $LE_EXPIRY）"
                cp /etc/letsencrypt/live/workly.cloud/fullchain.pem ssl/fullchain.pem
                cp /etc/letsencrypt/live/workly.cloud/privkey.pem ssl/privkey.pem
                chmod 600 ssl/privkey.pem
                SSL_UPDATED=true
                echo "✅ SSL 证书已从 Let's Encrypt 更新"
              fi
            fi

            # 如果 Let's Encrypt 无有效证书，回退到 GitHub Secrets
            if [ "$SSL_UPDATED" = "false" ]; then
              if [ -n "$SSL_FULLCHAIN" ] && [ -n "$SSL_PRIVKEY" ]; then
                echo "🔐 写入 GitHub Secrets 中的 SSL 证书..."
                printf '%s\n' "$SSL_FULLCHAIN" > ssl/fullchain.pem
                printf '%s\n' "$SSL_PRIVKEY" > ssl/privkey.pem
                chmod 600 ssl/privkey.pem
                echo "✅ SSL 证书已从 Secrets 写入"
              else
                echo "⚠️ 未提供 SSL 证书，HTTPS 可能不可用"
              fi
            fi

            # 保存镜像前缀（后续 docker pull 需要用）
            IMAGE_PREFIX="${DOCKER_USERNAME}/word-teacher"

            # ============================================================
            # 3. 清除 shell 环境变量，避免覆盖 .env 文件
            # ============================================================
            unset MYSQL_ROOT_PASSWORD MYSQL_PASSWORD JWT_SECRET AGENT_API_KEY
            unset MINIO_ROOT_USER MINIO_ROOT_PASSWORD DOCKER_USERNAME
            unset DASHSCOPE_API_KEY ALIYUN_STT_APPKEY ALIYUN_AK_ID ALIYUN_AK_SECRET
            unset XFYUN_APP_ID XFYUN_API_KEY XFYUN_API_SECRET
            unset DINGTALK_ACCESS_TOKEN DINGTALK_SECRET
            unset CORS_ORIGINS IMAGE_TAG

            # ============================================================
            # 4. 确保 docker compose 可用 + 镜像加速
            # ============================================================
            if ! docker compose version >/dev/null 2>&1; then
              echo "📦 安装 docker compose plugin..."
              apt-get update -qq && apt-get install -y -qq docker-compose-plugin
            fi

            # ============================================================
            # 5. 拉取最新镜像（直连 Docker Hub，不走镜像加速器）
            # ============================================================
            echo "📥 拉取最新镜像..."

            # 临时移除镜像加速器，避免加速器 429 限流导致 pull 失败
            if grep -q "registry-mirrors" /etc/docker/daemon.json 2>/dev/null; then
              echo "⚠️ 检测到镜像加速器配置，临时移除以直连 Docker Hub..."
              cp /etc/docker/daemon.json /etc/docker/daemon.json.bak
              echo '{}' > /etc/docker/daemon.json
              systemctl reload docker
              sleep 2
            fi

            [ "$BUILD_BACKEND" = "success" ] && docker pull "${IMAGE_PREFIX}-backend:latest"
            [ "$BUILD_FRONTEND" = "success" ] && docker pull "${IMAGE_PREFIX}-nginx:latest"
            [ "$BUILD_AGENT" = "success" ] && docker pull "${IMAGE_PREFIX}-agent:latest"

            # 恢复镜像加速器配置（供其他非 CI 场景使用）
            if [ -f /etc/docker/daemon.json.bak ]; then
              mv /etc/docker/daemon.json.bak /etc/docker/daemon.json
              systemctl reload docker
              sleep 2
            fi

            # ============================================================
            # 6. 启动基础设施服务（mysql、minio）并等待就绪
            # ============================================================
            echo "🛠️ 启动基础设施服务..."
            docker compose -f docker-compose.prod.yml up -d mysql minio

            echo "⏳ 等待 MySQL 就绪..."
            MYSQL_READY=false
            for i in $(seq 1 60); do
              if docker compose -f docker-compose.prod.yml exec -T mysql mysqladmin ping -h localhost --silent 2>/dev/null; then
                echo "✅ MySQL 已就绪 (${i}s)"
                MYSQL_READY=true
                break
              fi
              sleep 2
            done
            if [ "$MYSQL_READY" = "false" ]; then
              echo "❌ MySQL 启动超时!"
              docker compose -f docker-compose.prod.yml logs mysql --tail 20
              exit 1
            fi

            echo "⏳ 等待 MinIO 就绪..."
            MINIO_READY=false
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml exec -T minio mc ready local 2>/dev/null; then
                echo "✅ MinIO 已就绪 (${i}s)"
                MINIO_READY=true
                break
              fi
              sleep 2
            done
            if [ "$MINIO_READY" = "false" ]; then
              echo "⚠️ MinIO 健康检查未通过，但继续部署（MinIO 可能仍在启动）"
              sleep 5
            fi

            # ============================================================
            # 7. 蓝绿部署 — canary 验证后再切换
            # ============================================================
            DOCKER_NETWORK="word-teacher_word-teacher-network"
            DEPLOY_FAILED=""

            # 清理上次可能残留的 canary 容器
            docker rm -f word-teacher-backend-canary word-teacher-agent-canary word-teacher-nginx-canary 2>/dev/null || true

            # --- 蓝绿部署函数 ---
            deploy_with_canary() {
              local SERVICE="$1"
              local HEALTH_CMD="$2"
              local IMAGE="$3"
              local ENV_ARGS="$4"
              local CANARY_NAME="word-teacher-${SERVICE}-canary"

              echo "🔵 [${SERVICE}] 启动 canary 容器验证新镜像..."

              # 启动 canary（连入同一网络，不映射外部端口）
              docker run -d --name "$CANARY_NAME" \
                --network "$DOCKER_NETWORK" \
                --env-file .env \
                $ENV_ARGS \
                "$IMAGE" >/dev/null 2>&1

              # 健康检查（最多等 40 秒）
              local HEALTHY=false
              for i in $(seq 1 20); do
                if docker exec "$CANARY_NAME" $HEALTH_CMD 2>/dev/null; then
                  HEALTHY=true
                  echo "✅ [${SERVICE}] canary 健康检查通过 (${i}x2s)"
                  break
                fi
                sleep 2
              done

              # 打印 canary 日志用于诊断
              if [ "$HEALTHY" = "false" ]; then
                echo "❌ [${SERVICE}] canary 健康检查失败！保留旧容器，跳过部署"
                echo "--- canary 日志 ---"
                docker logs "$CANARY_NAME" --tail 30 2>&1 || true
                echo "--- end ---"
              fi

              # 清理 canary 容器
              docker rm -f "$CANARY_NAME" >/dev/null 2>&1

              if [ "$HEALTHY" = "true" ]; then
                echo "🟢 [${SERVICE}] 切换到新版本..."
                docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate "$SERVICE"
                echo "✅ [${SERVICE}] 部署完成"
                return 0
              else
                DEPLOY_FAILED="${DEPLOY_FAILED} ${SERVICE}"
                return 1
              fi
            }

            # --- Backend 蓝绿部署 ---
            if [ "$BUILD_BACKEND" = "success" ]; then
              deploy_with_canary "backend" \
                "wget -q --spider http://localhost:3001/api/health" \
                "${IMAGE_PREFIX}-backend:latest" \
                "-e NODE_ENV=production -e PORT=3001 -e DATABASE_URL=mysql://wordteacher:\$(grep MYSQL_PASSWORD .env | cut -d= -f2)@mysql:3306/word_teacher -e LANCEDB_PATH=/app/data/lancedb"
            fi

            # --- Agent 蓝绿部署 ---
            if [ "$BUILD_AGENT" = "success" ]; then
              deploy_with_canary "agent" \
                "wget -q --spider http://localhost:3002/api/agent/health" \
                "${IMAGE_PREFIX}-agent:latest" \
                "-e NODE_ENV=production -e PORT=3002"
            fi

            # --- Nginx 蓝绿部署 ---
            if [ "$BUILD_FRONTEND" = "success" ]; then
              deploy_with_canary "nginx" \
                "wget -q --spider http://localhost:8080/health" \
                "${IMAGE_PREFIX}-nginx:latest" \
                ""
            fi

            # 如果没有任何服务单独构建（仅配置变化或全新部署），拉起全部服务
            if [ "$BUILD_BACKEND" != "success" ] && [ "$BUILD_AGENT" != "success" ] && [ "$BUILD_FRONTEND" != "success" ]; then
              echo "🔄 全量启动所有服务..."
              docker compose -f docker-compose.prod.yml up -d
              echo "✅ 全部服务启动完成"
            fi

            # ============================================================
            # 8. 等待 Backend 就绪并同步数据库
            # ============================================================
            echo "🗄️ 等待 Backend 就绪并同步数据库结构..."
            BACKEND_READY=false
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml exec -T backend wget -q --spider http://localhost:3001/api/health 2>/dev/null; then
                BACKEND_READY=true
                break
              fi
              sleep 2
            done
            if [ "$BACKEND_READY" = "true" ]; then
              if docker compose -f docker-compose.prod.yml exec -T backend npx prisma db push --skip-generate 2>&1; then
                echo "✅ 数据库结构同步完成"
              else
                echo "⚠️ 数据库同步失败（可能存在破坏性变更需要手动处理），但不阻塞部署"
              fi
            else
              echo "⚠️ Backend 未就绪，跳过数据库同步（容器可能仍在启动，prisma 会在下次部署补上）"
            fi

            # ============================================================
            # 8.5 同步知识库到 LanceDB 向量数据库
            # ============================================================
            if [ "$BACKEND_READY" = "true" ]; then
              echo "📚 同步知识库数据..."
              if docker compose -f docker-compose.prod.yml exec -T backend node dist/scripts/seed-knowledge.js 2>&1; then
                echo "✅ 知识库同步完成"
              else
                echo "⚠️ 知识库同步失败，但不阻塞部署"
              fi
            fi

            # ============================================================
            # 9. 确保 Nginx 启动（依赖 backend + minio 都就绪）
            # ============================================================
            if ! docker compose -f docker-compose.prod.yml ps --format json nginx 2>/dev/null | grep -q '"State":"running"'; then
              echo "🌐 重启 Nginx..."
              docker compose -f docker-compose.prod.yml up -d nginx
              sleep 3
            fi

            # ============================================================
            # 10. 清理旧镜像（保留最近 7 天，不再全量 prune）
            # ============================================================
            echo "🧹 清理悬空镜像..."
            docker image prune -f --filter "until=168h"

            # ============================================================
            # 11. 最终状态检查
            # ============================================================
            echo "🏥 最终健康检查..."
            sleep 8
            docker compose -f docker-compose.prod.yml ps

            FAILED=""
            for svc in mysql minio backend nginx; do
              STATUS=$(docker compose -f docker-compose.prod.yml ps --format json $svc 2>/dev/null | grep -o '"State":"[^"]*"' | head -1 | cut -d'"' -f4)
              if [ "$STATUS" != "running" ]; then
                FAILED="$FAILED $svc"
                echo "❌ 服务 $svc 状态异常 (state=$STATUS):"
                docker compose -f docker-compose.prod.yml logs $svc --tail 5
              fi
            done

            # canary 验证失败的服务（旧容器仍在运行，但新版本未部署）
            if [ -n "$DEPLOY_FAILED" ]; then
              echo ""
              echo "⚠️ 以下服务 canary 验证失败，已保留旧版本运行:${DEPLOY_FAILED}"
              echo "⚠️ 请检查新镜像问题后重新触发部署"
              exit 1
            fi

            if [ -n "$FAILED" ]; then
              echo "❌ 以下服务未正常运行:$FAILED"
              exit 1
            fi

            echo "✅ 部署完成! 所有服务运行正常 🎉"

  # 部署结果通知
  notify:
    needs: deploy
    if: always() && needs.deploy.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Notify deployment result
        env:
          DINGTALK_ACCESS_TOKEN: ${{ secrets.DINGTALK_ACCESS_TOKEN }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          DEPLOY_TAG: ${{ env.DEPLOY_TAG }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # 取 commit message 第一行作为摘要
          COMMIT_SUMMARY=$(echo "$COMMIT_MSG" | head -1)

          if [ "$DEPLOY_RESULT" == "success" ]; then
            echo "✅ 部署成功!"
            TITLE="✅ Word Teacher 部署成功"
            TEXT="**部署成功** 🎉\n\n- 提交: ${GITHUB_SHA:0:7} ${COMMIT_SUMMARY}\n- 镜像版本: ${DEPLOY_TAG:-latest}\n- 触发: ${{ github.event_name }}\n- 分支: ${{ github.ref_name }}\n- 时间: $(date '+%Y-%m-%d %H:%M:%S')"
          else
            echo "❌ 部署失败!"
            TITLE="❌ Word Teacher 部署失败（旧版本仍在运行）"
            TEXT="**部署失败（已自动保护）** ⚠️\n\n- 提交: ${GITHUB_SHA:0:7} ${COMMIT_SUMMARY}\n- 镜像版本: ${DEPLOY_TAG:-latest}\n- 当前状态: 🟢 旧版本仍在正常运行，线上无影响\n- 失败原因: 新镜像 canary 健康检查未通过\n- 触发: ${{ github.event_name }}\n- 时间: $(date '+%Y-%m-%d %H:%M:%S')\n- [查看日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          fi

          # 发送钉钉通知（如果配置了）
          if [ -n "$DINGTALK_ACCESS_TOKEN" ] && [ -n "$DINGTALK_SECRET" ]; then
            TIMESTAMP=$(date +%s%3N)
            SIGN=$(printf "%s\n%s" "$TIMESTAMP" "$DINGTALK_SECRET" | openssl dgst -sha256 -hmac "$DINGTALK_SECRET" -binary | base64)
            SIGN_ENCODED=$(printf '%s' "$SIGN" | python3 -c "import sys,urllib.parse;print(urllib.parse.quote(sys.stdin.read().strip()))")
            WEBHOOK="https://oapi.dingtalk.com/robot/send?access_token=${DINGTALK_ACCESS_TOKEN}&timestamp=${TIMESTAMP}&sign=${SIGN_ENCODED}"
            curl -s -X POST "$WEBHOOK" \
              -H 'Content-Type: application/json' \
              -d "{\"msgtype\":\"markdown\",\"markdown\":{\"title\":\"$TITLE\",\"text\":\"$TEXT\"}}" || true
          fi

          # 部署失败时让 workflow 标红
          if [ "$DEPLOY_RESULT" != "success" ]; then
            exit 1
          fi
