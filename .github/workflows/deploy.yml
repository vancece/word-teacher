name: Deploy to Server

on:
  push:
    branches: [master]
  workflow_dispatch:  # 允许手动触发

env:
  IMAGE_PREFIX: word-teacher

jobs:
  # 检测哪些服务需要重新构建
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      agent: ${{ steps.changes.outputs.agent }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          # 手动触发时强制全量构建
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger: force rebuild all"
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "agent=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 获取变更的文件
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "Changed files: $CHANGED"

          if echo "$CHANGED" | grep -qE "^backend/|^Dockerfile.backend|^prisma/"; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE "^frontend/|^admin/|^homepage/|^Dockerfile.nginx|^deploy/nginx"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE "^agent/|^Dockerfile.agent"; then
            echo "agent=true" >> $GITHUB_OUTPUT
          else
            echo "agent=false" >> $GITHUB_OUTPUT
          fi

  # 构建 + 直传部署（不走 Docker Hub）
  build-and-deploy:
    needs: detect-changes
    if: always() && needs.detect-changes.result == 'success'
    runs-on: ubuntu-latest
    env:
      BUILD_BACKEND: ${{ needs.detect-changes.outputs.backend }}
      BUILD_FRONTEND: ${{ needs.detect-changes.outputs.frontend }}
      BUILD_AGENT: ${{ needs.detect-changes.outputs.agent }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend image
        if: env.BUILD_BACKEND == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          load: true
          tags: ${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend/Nginx image
        if: env.BUILD_FRONTEND == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.nginx
          load: true
          tags: ${{ env.IMAGE_PREFIX }}-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Agent image
        if: env.BUILD_AGENT == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.agent
          load: true
          tags: ${{ env.IMAGE_PREFIX }}-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export images
        run: |
          mkdir -p /tmp/images
          if [ "$BUILD_BACKEND" = "true" ]; then
            echo "📦 导出 Backend 镜像..."
            docker save ${{ env.IMAGE_PREFIX }}-backend:latest | gzip > /tmp/images/backend.tar.gz
            echo "  大小: $(du -h /tmp/images/backend.tar.gz | cut -f1)"
          fi
          if [ "$BUILD_FRONTEND" = "true" ]; then
            echo "📦 导出 Nginx 镜像..."
            docker save ${{ env.IMAGE_PREFIX }}-nginx:latest | gzip > /tmp/images/nginx.tar.gz
            echo "  大小: $(du -h /tmp/images/nginx.tar.gz | cut -f1)"
          fi
          if [ "$BUILD_AGENT" = "true" ]; then
            echo "📦 导出 Agent 镜像..."
            docker save ${{ env.IMAGE_PREFIX }}-agent:latest | gzip > /tmp/images/agent.tar.gz
            echo "  大小: $(du -h /tmp/images/agent.tar.gz | cut -f1)"
          fi
          ls -lh /tmp/images/ 2>/dev/null || echo "No images (config-only change)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Generate .env file
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          ALIYUN_STT_APPKEY: ${{ vars.ALIYUN_STT_APPKEY }}
          ALIYUN_AK_ID: ${{ secrets.ALIYUN_AK_ID }}
          ALIYUN_AK_SECRET: ${{ secrets.ALIYUN_AK_SECRET }}
          XFYUN_APP_ID: ${{ vars.XFYUN_APP_ID }}
          XFYUN_API_KEY: ${{ secrets.XFYUN_API_KEY }}
          XFYUN_API_SECRET: ${{ secrets.XFYUN_API_SECRET }}
          DINGTALK_ACCESS_TOKEN: ${{ secrets.DINGTALK_ACCESS_TOKEN }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          {
            printf 'IMAGE_TAG=latest\n'
            printf 'IMAGE_PREFIX=word-teacher\n'
            printf 'MYSQL_ROOT_PASSWORD=%s\n' "$MYSQL_ROOT_PASSWORD"
            printf 'MYSQL_PASSWORD=%s\n' "$MYSQL_PASSWORD"
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'CORS_ORIGINS=*\n'
            printf 'AGENT_API_KEY=%s\n' "$AGENT_API_KEY"
            printf 'MINIO_ROOT_USER=admin\n'
            printf 'MINIO_ROOT_PASSWORD=%s\n' "$MINIO_ROOT_PASSWORD"
            printf 'MINIO_BUCKET=covers\n'
            printf 'MINIO_PUBLIC_PATH=/minio\n'
            printf 'DASHSCOPE_API_KEY=%s\n' "$DASHSCOPE_API_KEY"
            printf 'ALIYUN_STT_APPKEY=%s\n' "$ALIYUN_STT_APPKEY"
            printf 'ALIYUN_AK_ID=%s\n' "$ALIYUN_AK_ID"
            printf 'ALIYUN_AK_SECRET=%s\n' "$ALIYUN_AK_SECRET"
            printf 'XFYUN_APP_ID=%s\n' "$XFYUN_APP_ID"
            printf 'XFYUN_API_KEY=%s\n' "$XFYUN_API_KEY"
            printf 'XFYUN_API_SECRET=%s\n' "$XFYUN_API_SECRET"
            printf 'DINGTALK_ACCESS_TOKEN=%s\n' "$DINGTALK_ACCESS_TOKEN"
            printf 'DINGTALK_SECRET=%s\n' "$DINGTALK_SECRET"
          } > /tmp/deploy.env
          echo "✅ .env 已生成 ($(wc -l < /tmp/deploy.env) 行)"

      - name: Transfer files to server
        run: |
          SERVER="root@${{ secrets.SERVER_HOST }}"
          SCP="scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $SERVER"

          $SSH "mkdir -p /root/word-teacher /tmp/word-teacher-images"

          # 传 .env 和 docker-compose
          $SCP /tmp/deploy.env $SERVER:/root/word-teacher/.env
          $SCP docker-compose.prod.yml $SERVER:/root/word-teacher/docker-compose.prod.yml

          # 传镜像
          for img in backend nginx agent; do
            if [ -f /tmp/images/${img}.tar.gz ]; then
              echo "📤 传输 ${img} 镜像 ($(du -h /tmp/images/${img}.tar.gz | cut -f1))..."
              $SCP /tmp/images/${img}.tar.gz $SERVER:/tmp/word-teacher-images/
            fi
          done

      - name: Transfer SSL certificates
        env:
          SSL_FULLCHAIN: ${{ secrets.SSL_FULLCHAIN }}
          SSL_PRIVKEY: ${{ secrets.SSL_PRIVKEY }}
        run: |
          SERVER="root@${{ secrets.SERVER_HOST }}"
          SCP="scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $SERVER"

          if [ -n "$SSL_FULLCHAIN" ] && [ -n "$SSL_PRIVKEY" ]; then
            printf '%s\n' "$SSL_FULLCHAIN" > /tmp/fullchain.pem
            printf '%s\n' "$SSL_PRIVKEY" > /tmp/privkey.pem
            $SSH "mkdir -p /root/word-teacher/ssl"
            $SCP /tmp/fullchain.pem $SERVER:/root/word-teacher/ssl/fullchain.pem
            $SCP /tmp/privkey.pem $SERVER:/root/word-teacher/ssl/privkey.pem
            $SSH "chmod 600 /root/word-teacher/ssl/privkey.pem"
            echo "✅ SSL 证书已传输"
          else
            echo "⏭️ 未配置 SSL 证书，跳过"
          fi

      - name: Deploy on server
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ secrets.SERVER_HOST }}"

          $SSH '
          set -e
          cd /root/word-teacher
          echo "🚀 开始部署..."

          # 加载新镜像
          for img in backend nginx agent; do
            if [ -f /tmp/word-teacher-images/${img}.tar.gz ]; then
              echo "📥 加载 ${img} 镜像..."
              gunzip -c /tmp/word-teacher-images/${img}.tar.gz | docker load
            fi
          done

          # 判断哪些服务需要重启
          RECREATE_SERVICES=""
          if [ -f /tmp/word-teacher-images/backend.tar.gz ]; then RECREATE_SERVICES="${RECREATE_SERVICES} backend"; fi
          if [ -f /tmp/word-teacher-images/agent.tar.gz ]; then RECREATE_SERVICES="${RECREATE_SERVICES} agent"; fi
          if [ -f /tmp/word-teacher-images/nginx.tar.gz ]; then RECREATE_SERVICES="${RECREATE_SERVICES} nginx"; fi

          if [ -n "$RECREATE_SERVICES" ]; then
            echo "🔄 重启服务:$RECREATE_SERVICES"
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate $RECREATE_SERVICES
          else
            echo "🔄 仅配置变化，重启所有服务..."
            docker compose -f docker-compose.prod.yml up -d --force-recreate
          fi

          # 清理
          rm -rf /tmp/word-teacher-images
          docker image prune -f

          echo "✅ 部署完成!"
          docker compose -f docker-compose.prod.yml ps
          '

  notify:
    needs: build-and-deploy
    if: always() && needs.build-and-deploy.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.build-and-deploy.result }}" == "success" ]; then
            echo "✅ 部署成功!"
          else
            echo "❌ 部署失败!"
            exit 1
          fi
